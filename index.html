<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mega Pediatric Prescription & PALS Calculator</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; padding: 20px; background-color: #f4f7f6; color: #333; }
        .container { max-width: 850px; margin: 0 auto; background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        h2 { color: #2c3e50; text-align: center; border-bottom: 2px solid #ecf0f1; padding-bottom: 15px; }
        .warning { background-color: #fff3cd; color: #856404; padding: 12px; border-radius: 6px; font-size: 0.85em; text-align: center; margin-bottom: 25px; border: 1px solid #ffeeba; line-height: 1.4; }
        .input-group { background: #f8f9fa; padding: 15px; border-radius: 8px; border: 1px solid #e9ecef; margin-bottom: 20px; }
        label { font-weight: bold; display: block; margin-top: 10px; margin-bottom: 8px; color: #34495e; }
        input[type="number"], select { width: 100%; padding: 12px; border-radius: 6px; border: 1px solid #bdc3c7; font-size: 16px; margin-bottom: 10px; background-color: #fff; box-sizing: border-box; transition: all 0.3s; }
        input[type="number"]:focus, select:focus { outline: none; border-color: #3498db; box-shadow: 0 0 8px rgba(52, 152, 219, 0.4); }
        #result-box { margin-top: 25px; padding: 20px; border-left: 5px solid #27ae60; background-color: #eafaf1; display: none; border-radius: 0 8px 8px 0; position: relative; }
        .rx-title { font-weight: bold; color: #27ae60; margin-bottom: 12px; display: block; text-transform: uppercase; font-size: 0.9em; letter-spacing: 1px; }
        .rx-content { font-family: 'Courier New', Courier, monospace; font-size: 1.2em; line-height: 1.6; color: #2c3e50; font-weight: bold; background: #fff; padding: 15px; border-radius: 6px; border: 1px dashed #27ae60; }
        .rx-note { font-family: 'Segoe UI', sans-serif; font-size: 0.9em; color: #7f8c8d; margin-top: 12px; font-weight: normal; background: #fff; padding: 10px; border-radius: 4px; border: 1px solid #ecf0f1; }
        .highlight { color: #e74c3c; font-weight: bold; background: #fadbd8; padding: 2px 6px; border-radius: 4px; }
        .copy-btn { position: absolute; top: 20px; right: 20px; background: #27ae60; color: white; border: none; padding: 8px 15px; border-radius: 4px; cursor: pointer; font-size: 0.9em; font-weight: bold; transition: background 0.3s; }
        .copy-btn:hover { background: #219150; }
    </style>
</head>
<body>

<div class="container">
    <h2>Mega Pediatric Rx & PALS Calculator</h2>
    <div class="warning">
        <strong>Disclaimer:</strong> Educational tool only. Assumes standard mg/kg dosing. Always independently verify maximum limits, contraindications, and dilutions before prescribing.
    </div>

    <div class="input-group">
        <label for="weight">Patient Weight (kg)</label>
        <input type="number" id="weight" placeholder="Enter weight in kg (e.g., 14.5)" step="0.1" min="0" oninput="showPrescription()">
    </div>

    <label for="category">1. Select Clinical System / Category</label>
    <select id="category" onchange="updateMedList()">
        <option value="">-- Choose Category --</option>
        <option value="neuro_pain">Analgesia, Sedation & Neurology (Seizure)</option>
        <option value="respiratory">Respiratory, Asthma & Allergy</option>
        <option value="gi">Gastrointestinal</option>
        <option value="antimicrobial">Antimicrobials (PO & IV)</option>
        <option value="cardio">Cardiovascular & Diuretics</option>
        <option value="emergency">Emergency, Resuscitation & PALS</option>
        <option value="fluids">IV Fluids, Electrolytes & Blood</option>
    </select>

    <label for="medication">2. Select Medication & Concentration</label>
    <select id="medication" onchange="showPrescription()" disabled>
        <option value="">-- Select Category First --</option>
    </select>

    <div id="result-box">
        <button class="copy-btn" onclick="copyToClipboard()" id="copyBtn">Copy Text</button>
        <span class="rx-title">Calculated Order:</span>
        <div id="prescription-text" class="rx-content"></div>
        <div id="prescription-note" class="rx-note"></div>
    </div>
</div>

<script>
    // 4-2-1 Maintenance Fluid Rule
    function calcMaintenance(wt) {
        if (wt <= 10) return (wt * 4).toFixed(1);
        if (wt <= 20) return (40 + ((wt - 10) * 2)).toFixed(1);
        return (60 + ((wt - 20) * 1)).toFixed(1);
    }

            { name: "Paracetamol Syrup (250mg/5ml)", rx: "Paracetamol Syrup (250 mg/5 ml) {dose} ml PO PRN q 4-6 hr for fever/pain", note: "Calculated at 15 mg/kg/dose. Max 1g/dose.", calc: w => Math.min(((w * 15) / 50), 20).toFixed(1) },

            { name: "Morphine IV (1 mg/ml)", rx: "Morphine IV (1 mg/ml) {dose} ml IV slow push q 2-4 hr PRN severe pain", note: "Calculated at 0.1 mg/kg/dose. Max 5 mg/dose initially.", calc: w => Math.min((w * 0.1), 5).toFixed(2) },
            { name: "Fentanyl IV (50 mcg/ml)", rx: "Fentanyl (50 mcg/ml) {dose} ml IV slow push q 1-2 hr PRN", note: "Calculated at 1 mcg/kg/dose. Max 50 mcg (1 ml) initially.", calc: w => Math.min(((w * 1) / 50), 1).toFixed(2) },
            { name: "Ketorolac IV (30 mg/ml)", rx: "Ketorolac (30 mg/ml) {dose} ml IV q 6 hr", note: "Calculated at 0.5 mg/kg/dose. Max 15-30 mg/dose.", calc: w => Math.min(((w * 0.5) / 30), 0.5).toFixed(2) },
            { name: "Diazepam Rectal Gel/Tube (5 mg/ml)", rx: "Diazepam Rectal (5 mg/ml) {dose} ml PR x 1 dose for active seizure", note: "Calculated at 0.5 mg/kg. Max 10-20 mg depending on age.", calc: w => Math.min(((w * 0.5) / 5), 4).toFixed(1) },

            { name: "Maintenance Fluid (D5 1/2 NS)", rx: "D5 0.45% NaCl IV Rate at {dose} ml/hr", note: "Calculated using the standard 4-2-1 Rule.", calc: w => calcMaintenance(w) },
            { name: "Maintenance Fluid (D5 NS)", rx: "D5 0.9% NaCl IV Rate at {dose} ml/hr", note: "4-2-1 Rule. Increasingly preferred to prevent hospital hyponatremia.", calc: w => calcMaintenance(w) },
            { name: "Potassium Chloride (KCl) Replacement", rx: "KCl {dose} mEq added to maintenance fluid", note: "Calculated at 2 mEq/kg/day. Do not exceed 40 mEq/L in peripheral line.", calc: w => (w * 2).toFixed(1) }
        ]
    };

    function updateMedList() {
        const catSelect = document.getElementById("category");
        const medSelect = document.getElementById("medication");
        const resultBox = document.getElementById("result-box");
        
        medSelect.innerHTML = '<option value="">-- Select Medication & Concentration --</option>';
        resultBox.style.display = "none";

        if (catSelect.value) {
            medSelect.disabled = false;
            medData[catSelect.value].forEach((item, index) => {
                let opt = document.createElement("option");
                opt.value = index;
                opt.textContent = item.name;
                medSelect.appendChild(opt);
            });
        } else {
            medSelect.disabled = true;
        }
        
        showPrescription();
    }

    function showPrescription() {
        const wtInput = parseFloat(document.getElementById("weight").value);
        const catValue = document.getElementById("category").value;
        const medIndex = document.getElementById("medication").value;
        const resultBox = document.getElementById("result-box");
        const rxText = document.getElementById("prescription-text");
        const rxNote = document.getElementById("prescription-note");
        const copyBtn = document.getElementById("copyBtn");

        // Reset copy button
        copyBtn.innerText = "Copy Text";
        copyBtn.style.background = "#27ae60";

        if (catValue && medIndex !== "") {
            const med = medData[catValue][medIndex];
            let finalRx = med.rx;

            if (!isNaN(wtInput) && wtInput > 0) {
                const calculatedDose = med.calc(wtInput);
                finalRx = finalRx.replace('{dose}', `<span class="highlight">${calculatedDose}</span>`);
            } else {
                finalRx = finalRx.replace('{dose}', '____');
            }

            rxText.innerHTML = finalRx;
            rxNote.innerText = med.note;
            resultBox.style.display = "block";
        } else {
            resultBox.style.display = "none";
        }
    }

    function copyToClipboard() {
        const textToCopy = document.getElementById("prescription-text").innerText;
        const copyBtn = document.getElementById("copyBtn");
        
        navigator.clipboard.writeText(textToCopy).then(() => {
            copyBtn.innerText = "Copied!";
            copyBtn.style.background = "#2c3e50";
        }).catch(err => {
            console.error('Failed to copy text: ', err);
            alert("Clipboard access denied. You can manually highlight and copy the text.");
        });
    }
</script>
